main:
  params: [args]
  steps:
    - init:
        assign:
          - project_id: ${args.project_id}
          - github_repo: ${args.github_repo}
          - event_type: ${args.event_type}

    - get_github_token:
        call: googleapis.secretmanager.v1.projects.secrets.versions.access
        args:
          name: ${"projects/" + project_id + "/secrets/github-token/versions/latest"}
        result: token_response

    - decode_token:
        assign:
          - github_token: ${text.decode(base64.decode(token_response.payload.data))}

    - trigger_github_action:
        try:
          steps:
            - dispatch:
                call: http.post
                args:
                  url: ${"https://api.github.com/repos/" + github_repo + "/dispatches"}
                  headers:
                    Authorization: ${"Bearer " + github_token}
                    Accept: application/vnd.github.v3+json
                    Content-Type: application/json
                  body:
                    event_type: ${event_type}
                  timeout: 60
                result: github_response

            - log_success:
                call: sys.log
                args:
                  text: ${"[INFO] GitHub dispatch success " + event_type + " (HTTP " + string(github_response.code) + ")"}
                  severity: INFO

        # Retries with doubling waiting time each retry
        retry:
          predicate: ${http.default_retry_predicate}
          max_retries: 3
          back_off:
            initial_delay: 10
            max_delay: 60
            multiplier: 2
        
        except:
            as: e
            steps:
              - log_error:
                  call: sys.log
                  args:
                    text: '${"[ERROR] GitHub dispatch failed for " + event_type + ". Error: " +  json.encode_to_string(e)}'
                    severity: CRITICAL
              - raise_error:
                  raise: ${e}