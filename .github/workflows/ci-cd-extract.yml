name: CI/CD - Data Extractor

on:
  pull_request:
    branches: [main]
    paths:
      - 'data_extractor/**'
      - '.github/workflows/ci-cd-extract.yml'
  push:
    branches: [main]
    paths:
      - 'data_extractor/**'
      - '.github/workflows/ci-cd-extract.yml'

  # Manual run
  workflow_dispatch:

permissions:
  contents: 'read'
  id-token: 'write'

env:
  ENV: dev
  REGION: us-east1
  REPO_NAME: BLMgithub/automated-predictive-pipeline
  IMAGE_NAME: data-extractor-dev
  JOB_NAME: google-drive-extractor-dev

jobs:
  code-quality-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "0.11.15"

      - name: Install dependencies
        run: uv pip install -r dev-requirements.txt
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Set Python Path
        run: echo "PYTHONPATH=$PWD" >> "$GITHUB_ENV"

      - name: Check Code Formatting
        run: black --check data_extractor/

      - name: Ruff Linting
        run: ruff check data_extractor/

      - name: Run Test w/ Coverage
        run: |
          pytest \
            --cov=data_extractor \
            --cov-report=term-missing \
            --cov-fail-under=85

  build-and-deploy:
    needs: code-quality-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

        # Handshake to GCP
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOYER_SA_EMAIL }}

      - name: Configure Docker Auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

          docker build -f data_extractor/Dockerfile -t $IMAGE_PATH .
          docker push $IMAGE_PATH

      - name: Update Cloud Run Job
        run: |
          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

          gcloud run jobs update ${{ env.JOB_NAME }} \
          --image $IMAGE_PATH \
          --region ${{ env.REGION }}