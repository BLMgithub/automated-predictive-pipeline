name: CI/CD - Data Extractor

on:
  pull_request:
    branches: [main]
    paths:
      - 'data_extractor/**'
      - '.github/workflows/ci-cd-extract.yml'
  push:
    branches: [main]
    paths:
      - 'data_extractor/**'
      - '.github/workflows/ci-cd-extract.yml'

  # Manual run
  workflow_dispatch:

jobs:
  code-quality-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install uv
          uv pip install --system -r dev-requirements.txt

      - name: Set Python Path
        run: echo "PYTHONPATH=$PWD" >> "$GITHUB_ENV"

      - name: Check Code Formatting
        run: black --check data_extractor/

      - name: Ruff Linting
        run: ruff check data_extractor/

      - name: Run Test w/ Coverage
        run: |
          pytest \
            --cov=data_extractor \
            --cov-report=term-missing \
            --cov-fail-under=85
